title: zero
description: A zero-dependency frontend framework with a Rust CLI.
theme: jekyll-theme-primer
plugins:
  - jekyll-seo-tag
# apply the nav-wrapped layout (extends Primer's `default`) to every doc page
defaults:
  - scope:
      path: ""
    values:
      layout: doc
# exclude README and the issues tree from the Jekyll build
exclude:
  - README.md
  - BEST_PRACTICES.md
  - zero-framework-spec.md
  - issues/
  - examples/
  - runtime/
  - crates/
  - target/
  - showcase/
  - Cargo.toml
  - Cargo.lock
